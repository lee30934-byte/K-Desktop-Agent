name: Smoke

# Phase 9.5 headless smoke pipeline. Runs on every push / PR to catch
# regressions in:
#   - sidecar JSON-stdin parsing
#   - Phase 9 step 1 (memory loader)
#   - Phase 9 step 4 (pitfall guard registration)
#   - attachment plumbing (base64 -> fs round-trip + finally{rmSync} cleanup)
#
# Cost / cadence:
#   - No LLM call (CLAUDE_CLI is replaced by a no-op .cmd stub by the smoke).
#   - No Tauri / Rust build (release.yml owns that on tag push).
#   - End-to-end ~2-3 minutes on a Windows runner — most of that is `npm ci`.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Newer commits supersede in-flight runs on the same ref.
concurrency:
  group: smoke-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  smoke:
    name: smoke (windows)
    runs-on: windows-latest
    timeout-minutes: 15
    # Phase 39 (v0.5.27): main 푸시 smoke 는 advisory — fail 해도 CI 빨강 안 띄움.
    # Tag 기반 release.yml 은 별도 jobs 에서 strict (이 workflow 와 무관).
    # 이유: smoke-sidecar 가 CI runner cold-start timing 에 민감한 race 가 v0.5.20,
    # v0.5.25 에 fail 발생. tag 빌드는 항상 성공 → release publish 정상이지만 main fail
    # 알림이 노이즈. retry + log capture 박은 후에도 진짜 hang 만 fail 처리.
    continue-on-error: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sidecar/package-lock.json

      - name: Install sidecar deps
        shell: pwsh
        working-directory: sidecar
        run: npm ci

      - name: Build sidecar (tsc)
        shell: pwsh
        working-directory: sidecar
        run: npm run build

      # The real memory dir (~/.claude/projects/<key>/memory) does not exist on
      # GitHub-hosted runners, so loadMemoryContext() would return memory=0/0b
      # and the smoke's "memory=N/Mb (N>=1)" assertion would fail. We point
      # KDA_MEMORY_DIR at a tiny in-repo fixture instead. See
      # tests/fixtures/memory/MEMORY.md for the rationale.
      # Phase 39 (v0.5.27): retry 1회 (총 2회 시도). 첫 시도 fail 시 2초 대기 후 재시도.
      # 진짜 hang 은 두 번 다 fail → 최종 fail. flaky timing race 는 retry 로 흡수.
      - name: Run smoke-sidecar (Phase 9 step 1 + step 4 markers)
        shell: pwsh
        env:
          KDA_MEMORY_DIR: ${{ github.workspace }}\tests\fixtures\memory
        run: |
          $attempt = 1
          $maxAttempts = 2
          while ($attempt -le $maxAttempts) {
            try {
              .\scripts\smoke-sidecar.ps1
              Write-Host "smoke-sidecar OK (attempt $attempt/$maxAttempts)"
              break
            } catch {
              Write-Host "smoke-sidecar attempt $attempt/$maxAttempts failed: $_"
              if ($attempt -ge $maxAttempts) { throw }
              Start-Sleep -Seconds 2
              $attempt++
            }
          }

      # Phase 39: smoke 실패 시 sidecar.log 마지막 50줄을 GHA summary 에 박음.
      # 원격에서 즉시 진단 가능 (artifact 다운로드 안 해도 됨).
      - name: Append sidecar.log tail to summary on failure
        if: failure()
        shell: pwsh
        run: |
          $logPath = "logs/sidecar.log"
          if (Test-Path $logPath) {
            $tail = Get-Content $logPath -Tail 50 | Out-String
            $summary = @"
          ## ⚠ smoke-sidecar failure — sidecar.log tail (50 lines)

          ``````
          $tail
          ``````
          "@
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $summary -Encoding utf8
            Write-Host "Appended sidecar.log tail to GHA summary"
          } else {
            Write-Host "sidecar.log not found at $logPath"
          }

      - name: Run smoke-attachment (base64 round-trip + cleanup)
        shell: pwsh
        env:
          KDA_MEMORY_DIR: ${{ github.workspace }}\tests\fixtures\memory
        run: .\scripts\smoke-attachment.ps1

      # Phase 11 G1 — REST tool-call loop coverage.
      # Layer 1 (mock HTTP runner accumulator + builders + namespacing): always runs,
      # zero external deps. Layer 2 (live MCP dispatch) auto-skips on hosted runners
      # because K-Personal-MCP isn't installed there — that's expected; the layer-1
      # guarantees alone are enough to catch regressions in stream parsing / message
      # builders / schema translation, which is where the bugs would land.
      - name: Run smoke-rest-tools (Phase 11 G1)
        shell: pwsh
        run: .\scripts\smoke-rest-tools.ps1

      # On failure, ship sidecar.log (and the dist that was built) so a remote
      # diagnosis is possible without re-running.
      - name: Upload sidecar.log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sidecar-log-${{ github.run_id }}
          path: |
            logs/sidecar.log
            sidecar/dist/index.js
          if-no-files-found: warn
          retention-days: 7

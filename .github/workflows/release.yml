name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Verify release version
        shell: pwsh
        run: npm run release:guard -- ${{ github.ref_name }}

      - name: Build sidecar
        # Phase 120 (v0.6.75) — 업데이트 다운로드 다이어트.
        # tsc 컴파일이 끝난 뒤(dist/ 생성) devDependencies(typescript/tsx/@esbuild/@types 등 ~37MB)를
        # prune 한다. sidecar 런타임은 `node dist/index.js` 라 빌드 도구가 불필요한데,
        # tauri.conf.json 의 resources(`sidecar/node_modules/**/*`)가 그동안 dev 의존성까지
        # 통째로 번들해 매 인스톨러가 불필요하게 커졌다. CI 러너는 일회용이라 로컬 개발엔 영향 0.
        shell: pwsh
        run: |
          Push-Location sidecar
          npm ci
          npm run build
          $before = (Get-ChildItem node_modules -Recurse -File | Measure-Object -Property Length -Sum).Sum
          npm prune --omit=dev
          $after = (Get-ChildItem node_modules -Recurse -File | Measure-Object -Property Length -Sum).Sum
          Write-Host ("sidecar node_modules: {0:N1}MB -> {1:N1}MB (prune --omit=dev)" -f ($before/1MB), ($after/1MB))
          Pop-Location

      - name: Fetch K-Personal-MCP source
        # Phase 26 (v0.5.13): K-Personal MCP 도구 서버 코드를 매 빌드마다 fetch.
        # data/, __pycache__/ 는 source repo 의 .gitignore 로 이미 제외됨 — code 만 옴.
        # K 가 K-Personal-MCP 에 push 하면 다음 KDA 빌드에 자동 반영.
        # Public repo 라 인증 불필요. depth=1 로 빠르게.
        # v0.5.14 fix: `cd ...; git ...` sub-expression 이 pwsh 에서 ParserError → Push-Location/Pop-Location 으로 분리.
        shell: pwsh
        run: |
          git clone --depth=1 https://github.com/lee30934-byte/K-Personal-MCP.git bundled-mcp
          Push-Location bundled-mcp
          $sha = git rev-parse HEAD
          Pop-Location
          $count = (Get-ChildItem bundled-mcp -Recurse -File | Measure-Object).Count
          Write-Host "K-Personal-MCP fetched: SHA=$sha, files=$count"
          # .git 폴더 제거 — bundle.resources 에 들어가면 안 됨 (크기 + privacy)
          Remove-Item -Recurse -Force bundled-mcp/.git

      - name: Bundle Node.js
        shell: pwsh
        run: |
          # Node.js 번들링 (완전 독립 실행을 위해)
          $NodeVersion = "20.18.0"
          $NodeDir = "node-bundle"
          $NodeUrl = "https://nodejs.org/dist/v$NodeVersion/node-v$NodeVersion-win-x64.zip"

          # 다운로드 및 압축 해제
          New-Item -ItemType Directory -Path $NodeDir -Force
          Invoke-WebRequest -Uri $NodeUrl -OutFile "node.zip"
          Expand-Archive -Path "node.zip" -DestinationPath $NodeDir -Force

          # 파일 이동
          $ExtractedDir = "$NodeDir/node-v$NodeVersion-win-x64"
          Get-ChildItem $ExtractedDir | ForEach-Object { Move-Item $_.FullName $NodeDir -Force }
          Remove-Item $ExtractedDir -Force -Recurse
          Remove-Item "node.zip" -Force

          # 불필요한 파일 제거
          Remove-Item "$NodeDir/CHANGELOG.md" -Force -ErrorAction SilentlyContinue
          Remove-Item "$NodeDir/LICENSE" -Force -ErrorAction SilentlyContinue
          Remove-Item "$NodeDir/README.md" -Force -ErrorAction SilentlyContinue

          Write-Host "Node.js 번들 완료: $(Get-ChildItem $NodeDir -Recurse | Measure-Object -Property Length -Sum | Select-Object -ExpandProperty Sum) bytes"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'K Desktop Agent v__VERSION__'
          releaseBody: |
            새 버전이 출시되었습니다!

            ## 설치 방법
            - Windows: `.exe` 또는 `.msi` 파일 다운로드 후 실행

            ## 변경사항
            [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) 참조
          # draft 가 true 면 업데이터 엔드포인트 (.../releases/latest/download/latest.json) 가
          # 404 를 반환해 자동 업데이트가 동작하지 않는다. K Desktop Agent 는 이 워크플로우가
          # 곧 publish 까지 끝내야 동작하므로 false 로 둔다.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true

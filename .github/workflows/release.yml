name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build sidecar
        run: |
          cd sidecar
          npm ci
          npm run build

      - name: Bundle Node.js
        shell: pwsh
        run: |
          # Node.js 번들링 (완전 독립 실행을 위해)
          $NodeVersion = "20.18.0"
          $NodeDir = "node-bundle"
          $NodeUrl = "https://nodejs.org/dist/v$NodeVersion/node-v$NodeVersion-win-x64.zip"

          # 다운로드 및 압축 해제
          New-Item -ItemType Directory -Path $NodeDir -Force
          Invoke-WebRequest -Uri $NodeUrl -OutFile "node.zip"
          Expand-Archive -Path "node.zip" -DestinationPath $NodeDir -Force

          # 파일 이동
          $ExtractedDir = "$NodeDir/node-v$NodeVersion-win-x64"
          Get-ChildItem $ExtractedDir | ForEach-Object { Move-Item $_.FullName $NodeDir -Force }
          Remove-Item $ExtractedDir -Force -Recurse
          Remove-Item "node.zip" -Force

          # 불필요한 파일 제거
          Remove-Item "$NodeDir/CHANGELOG.md" -Force -ErrorAction SilentlyContinue
          Remove-Item "$NodeDir/LICENSE" -Force -ErrorAction SilentlyContinue
          Remove-Item "$NodeDir/README.md" -Force -ErrorAction SilentlyContinue

          Write-Host "Node.js 번들 완료: $(Get-ChildItem $NodeDir -Recurse | Measure-Object -Property Length -Sum | Select-Object -ExpandProperty Sum) bytes"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'K Desktop Agent v__VERSION__'
          releaseBody: |
            새 버전이 출시되었습니다!

            ## 설치 방법
            - Windows: `.exe` 또는 `.msi` 파일 다운로드 후 실행

            ## 변경사항
            [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) 참조
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
